<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Background circle (optional subtle element) -->
  <circle cx="55" cy="55" r="52" fill="#e8f0fe" opacity="0.5"/>

  <!-- Car body -->
  <rect x="18" y="40" width="65" height="28" rx="6" fill="url(#carGrad)"/>

  <!-- Car roof / cabin -->
  <path d="M30 40 L38 25 L62 25 L70 40 Z" fill="#1e3a8a"/>

  <!-- Car windows -->
  <path d="M33 38 L40 27 L49 27 L49 38 Z" fill="#93c5fd" opacity="0.8"/>
  <path d="M52 38 L52 27 L60 27 L67 38 Z" fill="#93c5fd" opacity="0.8"/>

  <!-- Front windshield detail -->
  <path d="M68 38 L62 27 L64 27 L70 38 Z" fill="#bfdbfe" opacity="0.6"/>

  <!-- Headlight -->
  <circle cx="83" cy="54" r="3" fill="#fde047"/>
  <circle cx="83" cy="54" r="1.5" fill="#fef9c3"/>

  <!-- Taillight -->
  <rect x="16" y="50" width="4" height="8" rx="1" fill="#ef4444"/>

  <!-- Wheels -->
  <circle cx="35" cy="68" r="8" fill="#1f2937" stroke="#1e3a8a" stroke-width="2"/>
  <circle cx="35" cy="68" r="3" fill="#6b7280"/>

  <circle cx="66" cy="68" r="8" fill="#1f2937" stroke="#1e3a8a" stroke-width="2"/>
  <circle cx="66" cy="68" r="3" fill="#6b7280"/>

  <!-- Road line under car -->
  <line x1="8" y1="76" x2="95" y2="76" stroke="url(#roadGrad)" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- Speed motion lines -->
  <line x1="85" y1="45" x2="92" y2="45" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="87" y1="50" x2="95" y2="50" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="85" y1="55" x2="93" y2="55" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Company Name -->
  <text x="115" y="50" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="36" font-weight="800" fill="#1e293b">
    Drive
    <tspan fill="#1a56db">Fleet</tspan>
  </text>

  <!-- Tagline -->
  <text x="118" y="72" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="13" font-weight="500" fill="#64748b" letter-spacing="2">
    CAR RENTAL PLATFORM
  </text>

  <!-- Decorative line under tagline -->
  <line x1="118" y1="80" x2="280" y2="80" stroke="#1a56db" stroke-width="2" opacity="0.3"/>
</svg>